<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Galang & Citra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #000; color: white; }
        .font-aesthetic { font-family: 'Great Vibes', cursive; }
        .hero { 
            background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8)), 
            url('menikah.jpg'); /* INI HARUS SAMA DENGAN NAMA FOTO LO */
            background-size: cover; 
            background-position: center; 
            height: 100vh;
            display: flex; 
            align-items: center; 
            justify-content: center;
            text-align: center;
        }
        .glass { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); border: 2px solid #fbbf24; border-radius: 20px; padding: 20px; margin: 15px; }
    </style>
</head>
<body>
    <div class="hero">
        <div class="px-4 max-w-xl">
            <p class="uppercase tracking-[0.4em] text-amber-300 text-[10px] mb-2 font-bold">The Wedding of</p>
            <h1 class="font-aesthetic text-5xl md:text-7xl mb-4">Galang & Citra</h1>
            <p class="text-lg tracking-[0.2em] border-y border-amber-500 py-1 inline-block mb-6">08 . 03 . 2026</p>
            
            <div class="glass shadow-2xl">
                <p class="text-[13px] italic mb-4">"Ditunggu kehadiran mas-mas ganteng dan mba-mba cantik di hari bahagia kami."</p>
                <div class="border-t border-amber-500/30 pt-3 text-[12px]">
                    <h2 class="text-amber-400 font-bold uppercase mb-1">Lokasi Acara</h2>
                    <p>Jl. Karet Kavling RT 007 / RW 003, Desa Karet</p>
                    <p>Kec. Sepatan, Kab. Tangerang, Banten 15520</p>
                </div>
                <p class="mt-4 text-amber-300 font-bold text-lg">Minggu, 8 Maret 2026</p>
            </div>
        </div>
    </div>
</body>
</html>
